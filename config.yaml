# gitlab-copy configuration
# Copy settings from source to destination GitLab instance.
# See README.md for full usage guide.

source:
  url: https://source.example.com
  token_env: SOURCE_GITLAB_TOKEN      # env var name holding the source API token (api scope)

destination:
  url: https://dest.example.com
  token_env: DEST_GITLAB_TOKEN        # env var name holding the dest API token (api scope, Owner on groups)

# ---------------------------------------------------------------------------
# Group targeting
# ---------------------------------------------------------------------------
groups:
  include:
    - my-group                        # top-level group path(s) to process
  exclude: []                         # exclusion patterns (see below)
  include_subgroups: true             # recurse into subgroups

# Exclusion pattern examples:
#   - my-group/subgroup               exact path
#   - my-group/dast_*                 single-level glob
#   - my-group/dast/*                 all descendants at any depth

# ---------------------------------------------------------------------------
# Project targeting
# ---------------------------------------------------------------------------
projects:
  include: []                         # explicit project paths — if set, groups.include is not required
  # empty = derive all projects from groups.include
  exclude: []                         # exclusion patterns (same syntax as groups.exclude)
  include_subgroups: true             # include projects in subgroups when deriving from groups
  include_archived: false             # include archived projects
  max_depth: 0                        # 0 = unlimited depth (default)
    # 1 = projects in top group + direct subgroup projects only
  # 2 = one level deeper, etc.

# ---------------------------------------------------------------------------
# Concurrency — parallel API calls
# ---------------------------------------------------------------------------
concurrency:
  groups: 5
  projects: 10

# ---------------------------------------------------------------------------
# Domains — what to copy
# Comment out any domain you want to skip.
# ---------------------------------------------------------------------------
domains:
  groups:
    - push_rules                      # commit message regex, branch name rules, file size limits
    - description                     # group description
    - default_branch_name             # default branch for new projects in the group
    - default_branch_protection       # default branch protection rules applied to new projects (allowed_to_push, allowed_to_merge, force_push)
    - mr_settings                     # merge-if-pipeline-succeeds, resolve-all-discussions
    - mr_approval_settings            # author/committer approval, override permissions, retain approvals on push
    - protected_environments          # role-based deploy access per named environment
    - approval_rules                  # MR approval rule names and required counts (approvers need manual assignment)
    - jira_integration                # Jira integration config (credentials require manual verification on dest)
    - badges                          # group-level badges (inherited by all projects in the group)
    - compliance_frameworks           # compliance framework definitions (name, description, color, pipeline config)
    - compliance_assignments          # which projects have which frameworks assigned (run after compliance_frameworks)
    - security_policy_project         # links the security policy project to the group — requires the policy project to exist on dest first
    - deploy_tokens                   # group deploy tokens (new token value generated on dest — surfaced in report)
    - access_tokens                   # group access tokens — same name, scopes and access level copied, new token value surfaced in report

  projects:
    - topics                          # project tags/labels (AppID, CMDB ID, etc.)
    - environments                    # deployment environments with external URLs
    - protected_environments          # role-based deploy access per environment
    - jira_integration                # Jira integration config (credentials require manual verification on dest)
    - pipeline_triggers               # CI trigger tokens (new token generated on dest — update any CI variable references)
    - deploy_keys                     # SSH deploy keys (globally existing keys flagged for manual enable)
    - project_push_rules              # project-level commit and branch push rules
    - project_mr_approvals            # project-level MR approval settings
    - project_approval_rules          # project-level approval rules (approvers need manual assignment)
    - badges                          # pipeline status and coverage badges
    - project_protected_branches      # branch protection rules (role-based access levels only)
    - project_protected_tags          # tag protection rules (role-based access levels only)
    - deploy_tokens                   # project deploy tokens (new token value generated on dest — surfaced in report)
    - access_tokens                   # project access tokens — same name, scopes and access level copied, new token value surfaced in report

# Domains NOT listed here (cannot be automated):
#   security_policies       — no API for linking a policy project, configure via UI
#   access_tokens           — token value only shown at creation, create manually on dest
#   deploy_tokens           — secrets cannot be exported, regenerate on dest
#   masked/hidden variables — values are masked in API responses, create manually on dest

# ---------------------------------------------------------------------------
# Report output
# ---------------------------------------------------------------------------
output:
  dir: ./gl-copy-report               # directory for HTML and JSON reports
  formats:
    - terminal                        # colored output during the run
    - html                            # tabbed HTML report with collapsible cards
    - json                            # machine-readable output for pipeline integration