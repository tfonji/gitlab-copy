source:
  url: https://source.example.com
  token_env: SOURCE_GITLAB_TOKEN

destination:
  url: https://dest.example.com
  token_env: DEST_GITLAB_TOKEN

groups:
  include:
    - my-group
  exclude: []
  include_subgroups: true

projects:
  include: []        # empty = derive from groups
  exclude: []
  include_subgroups: true
  include_archived: false

concurrency:
  groups: 5
  projects: 10

# Tier 1 defaults — comment out domains you don't need
domains:
  groups:
    - push_rules
    - description
    - default_branch_name
    - mr_settings
    - mr_approval_settings
    - protected_environments
    - approval_rules
    - jira_integration
    - compliance_frameworks
  projects:
    - topics
    - environments
    - protected_environments
    - jira_integration
    - pipeline_triggers
    - deploy_keys
    - project_push_rules
    - project_mr_approvals
    - project_approval_rules
    - badges
    - project_protected_branches
    - project_protected_tags

output:
  dir: ./gl-copy-report
  formats:
    - terminal
    - html
    - json
